data:
  raw_dir: data/raw
  subsets:
  - FD001
  - FD002
  - FD003
  - FD004
  window_size: 30
  rul_cap: 125
  val_split: 0.2
  random_seed: 42
  flat_sensor_percentile: 30.0
  class_bins:
    healthy: 75
    degrading: 50
    warning: 25
    critical: 0
  oversample: false
  oversample_ratio: 0.3
  n_clusters: 3
  fault_modes:
    FD001: 0
    FD002: 0
    FD003: 1
    FD004: 1
  class_weight_override: null
model:
  input_dim: 17
  static_dim: 9
  hidden_dim: 128
  num_lstm_layers: 2
  dropout: 0.3
  cnn_kernels:
  - 3
  - 5
  - 7
  cnn_out_channels: 64
  attention_dim: 64
  num_classes: 4
training:
  epochs: 50
  batch_size: 128
  learning_rate: 0.0003
  weight_decay: 0.0001
  alpha: 0.5
  focal_gamma: 2.0
  patience: 15
  min_delta: 0.001
  lr_scheduler: cosine
  lr_min: 1.0e-05
inference:
  mc_passes: 50
  window_size: 30
mlflow:
  experiment_name: cmapss_rul_prediction
  tracking_uri: mlruns
  dagshub_user: LimVictoria
  dagshub_repo: PdM
api:
  host: 0.0.0.0
  port: 8000
