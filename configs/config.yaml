data:
  raw_dir: data/raw
  subsets: [FD001, FD002, FD003, FD004]
  window_size: 50
  stride: 10
  rul_cap: 125
  val_split: 0.2
  random_seed: 42
  n_clusters: 2
  min_rul_correlation: 0.1
  rolling_windows: [5, 20]

model:
  input_dim: 73       # auto-detected at runtime, this is just a placeholder
  static_dim: 9
  hidden_dim: 128
  num_lstm_layers: 2
  dropout: 0.4
  cnn_kernels: [3, 5, 7]
  cnn_out_channels: 64
  attention_dim: 64

training:
  epochs: 50
  batch_size: 128
  learning_rate: 0.0003
  weight_decay: 0.001
  lr_factor: 0.5
  lr_patience: 5
  lr_min: 0.00001
  patience: 15
  min_delta: 0.1

mlflow:
  dagshub_user: LimVictoria
  dagshub_repo: PdM
  experiment_name: cmapss-rul
  tracking_uri: mlruns
