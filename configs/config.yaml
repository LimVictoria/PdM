data:
  raw_dir: data/raw
  subsets: [FD001, FD002, FD003, FD004]
  window_size: 30
  rul_cap: 125
  val_split: 0.2
  random_seed: 42
  n_clusters: 2
  flat_sensor_percentile: 30.0
  # Rolling statistics: 14 sensors x 2 windows x 2 stats = 56 new features
  rolling_windows: [5, 20]
  oversample: false
  oversample_ratio: 0.5
  class_bins: [75, 50, 25]

model:
  # input_dim = 14 sensors + 3 op_cols + 56 rolling = 73
  input_dim: 73
  # static_dim = 3 clusters + 2 fault + 4 subsets = 9
  static_dim: 9
  hidden_dim: 128
  num_lstm_layers: 2
  dropout: 0.3
  cnn_kernels: [3, 5, 7]
  cnn_out_channels: 64
  attention_dim: 64
  num_classes: 4

training:
  epochs: 50
  batch_size: 128
  learning_rate: 0.0003
  weight_decay: 0.0001
  # Fixed scale normalisation: MSE/625 and FocalCE/1.5
  alpha: 0.5
  focal_gamma: 2.0
  lr_scheduler: plateau
  lr_factor: 0.5
  lr_patience: 5
  lr_min: 0.00001
  patience: 15
  min_delta: 0.001

mlflow:
  dagshub_user: LimVictoria
  dagshub_repo: PdM
  experiment_name: cmapss-rul
  tracking_uri: mlruns
